upstream django_server {
  server edemocracia:8000 fail_timeout=0;
}

map $http_x_forwarded_proto $edem_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 80;
  server_tokens off;
  absolute_redirect off;
  real_ip_header X-Real-IP;
  real_ip_recursive on;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location ~ ^/expressao/(assets|uploads|plugins|fonts|images)/(.*)$ {
    resolver 127.0.0.11 ipv6=off;
    proxy_pass http://discourse/$1/$2$is_args$args;
    proxy_read_timeout      90;
    proxy_connect_timeout   90;
    proxy_set_header  Host  $http_host;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $edem_forwarded_proto;
    proxy_set_header        X-Forwarded-Host  $http_host;
    proxy_redirect off;
  }

  location /images/ {
    resolver 127.0.0.11 ipv6=off;
    proxy_pass http://discourse/images/;
    proxy_read_timeout      90;
    proxy_connect_timeout   90;
    proxy_set_header  Host  $http_host;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $edem_forwarded_proto;
    proxy_set_header        X-Forwarded-Host  $http_host;
    proxy_redirect off;
  }

  location /static/ {
    root /var/labhacker/edemocracia/src;
    try_files /public$uri $uri /templates/edem-navigation$uri @npm_static;
  }

  location @npm_static {
    internal;
    rewrite ^/static/(.*)$ /$1 break;
    root /var/labhacker/edemocracia/node_modules;
  }

  location = /wikilegis/admin/login/ {
    if ($arg_next = "") {
      return 302 /admin/login/?next=/wikilegis/admin/;
    }
    return 302 /admin/login/?next=$arg_next;
  }

  location = /wikilegis/admin/logout/ {
    proxy_pass $scheme://django_server/accounts/global-logout/?next=/wikilegis/admin/login/;
    proxy_read_timeout      90;
    proxy_connect_timeout   90;
    proxy_set_header  Host  $http_host;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $edem_forwarded_proto;
    proxy_set_header        X-Forwarded-Host  $http_host;
    proxy_redirect off;
  }

  location /wikilegis/admin/ {
    resolver 127.0.0.11 ipv6=off;
    proxy_pass http://wikilegis:8000/admin/;
    proxy_read_timeout      90;
    proxy_connect_timeout   90;
    proxy_set_header  Host  $http_host;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $edem_forwarded_proto;
    proxy_set_header        X-Forwarded-Host  $http_host;
    proxy_set_header        Auth-User "";
    proxy_set_header        Remote-User "";
    proxy_set_header        Remote-User-Data "";
    proxy_set_header        X-Auth-User "";
    proxy_set_header        X-Remote-User "";
    proxy_set_header        X-Remote-User-Data "";
    proxy_redirect off;
  }

  location = /audiencias/admin/login/ {
    if ($arg_next = "") {
      return 302 /admin/login/?next=/audiencias/admin/;
    }
    return 302 /admin/login/?next=$arg_next;
  }

  location = /audiencias/admin/logout/ {
    proxy_pass $scheme://django_server/accounts/global-logout/?next=/audiencias/admin/login/;
    proxy_read_timeout      90;
    proxy_connect_timeout   90;
    proxy_set_header  Host  $http_host;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $edem_forwarded_proto;
    proxy_set_header        X-Forwarded-Host  $http_host;
    proxy_redirect off;
  }

  location /audiencias/ {
    resolver 127.0.0.11 ipv6=off;
    proxy_pass $scheme://audienciasweb:8000;
    proxy_read_timeout      90;
    proxy_connect_timeout   90;
    proxy_http_version  1.1;
    proxy_set_header  Upgrade $http_upgrade;
    proxy_set_header  Connection  "Upgrade";
    proxy_set_header  Host  $http_host;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $edem_forwarded_proto;
    proxy_set_header        X-Forwarded-Host  $http_host;
    proxy_set_header        Auth-User "";
    proxy_set_header        Remote-User "";
    proxy_set_header        Remote-User-Data "";
    proxy_set_header        X-Auth-User "";
    proxy_set_header        X-Remote-User "";
    proxy_set_header        X-Remote-User-Data "";
    proxy_redirect off;

    location /audiencias/static/ {
      alias /var/labhacker/audiencias/public/;
    }

    location /audiencias/media/ {
        alias  /var/labhacker/audiencias/public/media/;
    }
  }

  location / {
    proxy_pass $scheme://django_server;
    proxy_read_timeout      90;
    proxy_connect_timeout   90;
    proxy_set_header  Host  $http_host;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $edem_forwarded_proto;
    proxy_set_header        X-Forwarded-Host  $http_host;
    proxy_set_header        Auth-User "";
    proxy_set_header        Remote-User "";
    proxy_set_header        Remote-User-Data "";
    proxy_set_header        X-Auth-User "";
    proxy_set_header        X-Remote-User "";
    proxy_set_header        X-Remote-User-Data "";
    proxy_redirect off;

    location /wikilegis/static/ {
      alias /var/labhacker/wikilegis/wikilegis/public/;
    }

  }
}
