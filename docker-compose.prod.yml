services:
  nginx:
    restart: unless-stopped

  db:
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: root

  redis:
    restart: unless-stopped

  discourse_modern_db:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  edemocracia:
    restart: unless-stopped
    environment:
      SITE_NAME: ${SITE_NAME}
      SITE_LOGO: ${SITE_LOGO}
      SITE_LOGO_TEXT_LINE: ${SITE_LOGO_TEXT_LINE}
      SITE_LOGO_TEXT_CITY: ${SITE_LOGO_TEXT_CITY}
      SITE_URL: https://${PUBLIC_HOST}
      DEBUG: 'False'
      SECRET_KEY: ${EDEMOCRACIA_SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ALLOWED_HOSTS: ${PUBLIC_HOST},localhost,127.0.0.1,nginx,edemocracia${EXTRA_ALLOWED_HOSTS:+,${EXTRA_ALLOWED_HOSTS}}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      RECAPTCHA_PRIVATE_KEY: ${RECAPTCHA_PRIVATE_KEY}
      REGISTRATION_AUTO_ACTIVATE: 'False'
      REGISTRATION_SEND_ACTIVATION_EMAIL: 'True'
      REGISTRATION_USE_RDSTATION: 'False'
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      SOCIAL_AUTH_GOOGLE_OAUTH2_KEY: ${SOCIAL_AUTH_GOOGLE_OAUTH2_KEY}
      SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET: ${SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET}
      SOCIAL_AUTH_FACEBOOK_KEY: ${SOCIAL_AUTH_FACEBOOK_KEY}
      SOCIAL_AUTH_FACEBOOK_SECRET: ${SOCIAL_AUTH_FACEBOOK_SECRET}
      SOCIAL_AUTH_REDIRECT_IS_HTTPS: 'True'
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      WIKILEGIS_API_KEY: ${WIKILEGIS_API_KEY}
      AUDIENCIAS_API_KEY: ${AUDIENCIAS_API_KEY}
      DISCOURSE_SSO_SECRET: ${DISCOURSE_SSO_SECRET}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-True}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-True}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-False}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-False}
      X_FRAME_OPTIONS: DENY

  wikilegis:
    restart: unless-stopped
    environment:
      API_KEY: ${WIKILEGIS_API_KEY}
      SECRET_KEY: ${WIKILEGIS_SECRET_KEY}
      DEBUG: 'False'
      ALLOWED_HOSTS: ${PUBLIC_HOST},localhost,127.0.0.1,nginx,wikilegis${EXTRA_ALLOWED_HOSTS:+,${EXTRA_ALLOWED_HOSTS}}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}

  audienciasweb:
    restart: unless-stopped
    environment:
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      DJANGO_SECRET_KEY: ${AUDIENCIAS_SECRET_KEY}
      ALLOWED_HOSTS: ${PUBLIC_HOST},localhost,127.0.0.1,nginx,audienciasweb,audienciasworker${EXTRA_ALLOWED_HOSTS:+,${EXTRA_ALLOWED_HOSTS}}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}

  audienciasworker:
    restart: unless-stopped
    environment:
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      DJANGO_SECRET_KEY: ${AUDIENCIAS_SECRET_KEY}
      ALLOWED_HOSTS: ${PUBLIC_HOST},localhost,127.0.0.1,nginx,audienciasweb,audienciasworker${EXTRA_ALLOWED_HOSTS:+,${EXTRA_ALLOWED_HOSTS}}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}

  discourse:
    restart: unless-stopped
    environment:
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      DISCOURSE_DB_PASSWORD: ${POSTGRES_PASSWORD}
      DISCOURSE_HOSTNAME: ${PUBLIC_HOST}
      DISCOURSE_SMTP_ADDRESS: ${EMAIL_HOST}
      DISCOURSE_SMTP_PORT: ${EMAIL_PORT}
      DISCOURSE_SMTP_USER_NAME: ${EMAIL_HOST_USER}
      DISCOURSE_SMTP_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DISCOURSE_DEVELOPER_EMAILS: ${ADMIN_EMAIL}
      DISCOURSE_CONTACT_EMAIL: ${ADMIN_EMAIL}
      DISCOURSE_CONTACT_URL: https://${PUBLIC_HOST}
      DISCOURSE_NOTIFICATION_EMAIL: ${DISCOURSE_NOTIFICATION_EMAIL}
      DISCOURSE_SSO_URL: https://${PUBLIC_HOST}
      DISCOURSE_SSO_SECRET: ${DISCOURSE_SSO_SECRET}
      DISCOURSE_FORCE_HOSTNAME: ${PUBLIC_HOST}
